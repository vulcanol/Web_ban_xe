<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Bán Xe Ô Tô</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sidebar-bg: #0f172a;
      --sidebar-width: 260px;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --header-h: 64px;
    }
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      position: fixed; top: 0; left: 0;
      height: 100vh; overflow-y: auto;
      display: flex; flex-direction: column;
      z-index: 100;
      transition: transform 0.3s;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-brand .icon-wrap {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.1rem;
    }
    .sidebar-brand span { color: white; font-weight: 700; font-size: 1rem; }
    .sidebar-brand small { color: rgba(255,255,255,0.4); font-size: 0.7rem; display: block; }

    .sidebar-section { padding: 1rem 0.75rem 0.5rem; }
    .sidebar-section-label {
      color: rgba(255,255,255,0.3);
      font-size: 0.65rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 0 0.5rem; margin-bottom: 0.5rem;
    }
    .nav-item { margin-bottom: 2px; }
    .nav-link {
      display: flex; align-items: center; gap: 0.75rem;
      color: rgba(255,255,255,0.55);
      padding: 0.6rem 0.75rem;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.875rem; font-weight: 500;
      transition: all 0.2s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.9); }
    .nav-link.active { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .nav-link i { font-size: 1rem; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      background: var(--accent);
      color: white; font-size: 0.65rem;
      padding: 1px 6px; border-radius: 999px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 1rem 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .user-info {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem; border-radius: 10px;
      transition: background 0.2s;
    }
    .user-info:hover { background: rgba(255,255,255,0.05); }
    .avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 0.875rem;
      flex-shrink: 0;
    }
    .user-name { color: rgba(255,255,255,0.8); font-size: 0.8rem; font-weight: 600; }
    .user-role { color: rgba(255,255,255,0.35); font-size: 0.7rem; }
    .logout-btn {
      color: rgba(255,255,255,0.35);
      text-decoration: none; font-size: 0.8rem;
      padding: 0.4rem 0.5rem;
      border-radius: 8px;
      margin-top: 0.5rem;
      display: flex; align-items: center; gap: 0.5rem;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.15); color: #f87171; }

    /* MAIN */
    .main-content {
      margin-left: var(--sidebar-width);
      flex: 1; display: flex; flex-direction: column; min-height: 100vh;
    }
    .topbar {
      height: var(--header-h);
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 1.1rem; font-weight: 700; color: #0f172a; }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .topbar-badge {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; padding: 0.3rem 0.8rem;
      border-radius: 999px; font-size: 0.75rem; font-weight: 600;
    }
    .page-body { padding: 2rem; flex: 1; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-brand">
    <div class="icon-wrap"><i class="bi bi-car-front-fill"></i></div>
    <div>
      <span>Bán Xe Ô Tô</span>
      <small>Admin Panel</small>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Tổng Quan</div>
    <div class="nav-item">
      <a href="/admin" class="nav-link {#if activePage??}{#if activePage == 'dashboard'}active{/if}{/if}">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Quản Lý</div>
    <div class="nav-item">
      <a href="/admin/categories" class="nav-link {#if activePage??}{#if activePage == 'categories'}active{/if}{/if}">
        <i class="bi bi-grid-3x3-gap"></i> Danh Mục
      </a>
    </div>
    <div class="nav-item">
      <a href="/admin/brands" class="nav-link {#if activePage??}{#if activePage == 'brands'}active{/if}{/if}">
        <i class="bi bi-building"></i> Thương Hiệu
      </a>
    </div>
    <div class="nav-item">
      <a href="/admin/users" class="nav-link {#if activePage??}{#if activePage == 'users'}active{/if}{/if}">
        <i class="bi bi-people"></i> Người Dùng
      </a>
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="avatar">{session.fullName.substring(0,1).toUpperCase}</div>
      <div>
        <div class="user-name">{session.fullName}</div>
        <div class="user-role">Quản Trị Viên</div>
      </div>
    </div>
    <a href="/auth/logout" class="logout-btn">
      <i class="bi bi-box-arrow-left"></i> Đăng Xuất
    </a>
  </div>
</nav>

<!-- MAIN -->
<div class="main-content">
  <div class="topbar">
    <div class="topbar-title">{#insert pageTitle}Dashboard{/insert}</div>
    <div class="topbar-right">
      <span class="topbar-badge"><i class="bi bi-shield-check me-1"></i>ADMIN</span>
    </div>
  </div>
  <div class="page-body">
    {#insert body}{/insert}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
