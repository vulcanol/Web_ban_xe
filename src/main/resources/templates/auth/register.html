<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Ký - Bán Xe Ô Tô ID</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #0f0f0f;
      background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
      color: #333;
      position: relative;
    }

    /* Star pattern giống trang đăng nhập */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 15 L43 35 L65 40 L43 45 L40 65 L37 45 L15 40 L37 35 Z' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E");
      z-index: -1;
    }

    /* ── Brand header ── */
    .brand-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .brand-header .logo {
      width: 65px; height: 65px;
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      color: white;
    }
    .brand-header h2 {
      color: white;
      font-size: 0.95rem;
      font-weight: 500;
      margin: 0;
      letter-spacing: 0.5px;
    }

    /* ── Card trắng ── */
    .auth-container {
      background: white;
      width: 100%;
      max-width: 520px;
      padding: 2.5rem 3rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      position: relative;
    }

    /* Nút X quay về trang chủ */
    .close-btn {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #f1f1f1;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #555;
      font-size: 1rem;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      line-height: 1;
    }
    .close-btn:hover { background: #e0e0e0; color: #000; }

    /* ── Tiêu đề ── */
    .auth-container h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 2rem;
      color: #000;
      font-family: 'Times New Roman', Times, serif;
    }

    /* ── Inputs ── */
    .form-label {
      font-size: 0.82rem;
      font-weight: 500;
      color: #333;
      margin-bottom: 0.3rem;
    }
    .form-control {
      border: 1px solid #d4d4d4;
      border-radius: 0;
      padding: 0.8rem 1rem;
      font-size: 0.9rem;
      background-color: #f8f8f8;
      color: #333;
    }
    .form-control:focus {
      box-shadow: none;
      border-color: #0078d6;
      background-color: #fff;
    }
    .form-control::placeholder { color: #777; }

    /* Input group (icon + field) */
    .input-group-text {
      border: 1px solid #d4d4d4;
      border-right: none;
      border-radius: 0;
      background: #f8f8f8;
      color: #888;
    }
    .input-group .form-control {
      border-left: none;
      border-radius: 0;
    }
    .input-group .form-control:focus { border-left-color: transparent; }

    /* Nút hiện/ẩn mật khẩu */
    .password-toggle {
      border: 1px solid #d4d4d4;
      border-left: none;
      border-radius: 0;
      background: #f8f8f8;
      color: #888;
      cursor: pointer;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: #0078d6; }

    /* 2 cột */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .required { color: #cc0000; }

    /* ── Divider ── */
    .divider-region {
      text-align: center;
      margin: 1.75rem 0 1.5rem;
      position: relative;
      font-size: 0.85rem;
      color: #000;
      font-weight: 500;
    }
    .divider-region::before, .divider-region::after {
      content: '';
      position: absolute;
      top: 50%; width: 38%;
      height: 1px;
      background: #e0e0e0;
    }
    .divider-region::before { left: 0; }
    .divider-region::after { right: 0; }

    /* ── Điều khoản ── */
    .terms-section {
      font-size: 0.8rem;
      color: #333;
      margin-bottom: 1.5rem;
    }
    .terms-section a { color: #0078d6; text-decoration: none; }
    .terms-section a:hover { text-decoration: underline; }
    .form-check-input {
      border-radius: 0;
      margin-top: 0.2rem;
      border-color: #999;
      accent-color: #0078d6;
    }
    .form-check-input:checked {
      background-color: #0078d6;
      border-color: #0078d6;
    }

    .required-note { font-size: 0.75rem; color: #666; margin-bottom: 1.5rem; }

    /* ── Nút đăng ký ── */
    .btn-primary-custom {
      background-color: #0078d6;
      color: white;
      border: none;
      border-radius: 0;
      padding: 0.9rem;
      width: 100%;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background-color 0.2s;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .btn-primary-custom:hover { background-color: #005a9e; }

    /* ── Link đăng nhập ── */
    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #333;
    }
    .login-link a { color: #0078d6; text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }

    /* ── Footer ── */
    .footer-links {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
    }

    /* ── Alert lỗi ── */
    .alert-error {
      background: #fee2e2;
      border: 1px solid #ef4444;
      color: #b91c1c;
      padding: 0.75rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      text-align: center;
    }

    /* ── Strength bar ── */
    .strength-bar {
      height: 3px;
      border-radius: 0;
      margin-top: 0.35rem;
      background: #e0e0e0;
      overflow: hidden;
    }
    .strength-bar-fill {
      height: 100%;
      width: 0%;
      transition: width 0.3s, background-color 0.3s;
    }
    .strength-text {
      font-size: 0.72rem;
      margin-top: 0.2rem;
      color: #888;
    }
  </style>
</head>
<body>

  <!-- Brand header -->
  <div class="brand-header">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 2v10l-8.5 5"></path>
        <path d="M12 12l8.5 5"></path>
      </svg>
    </div>
    <h2>Bán Xe Ô Tô ID</h2>
  </div>

  <div class="auth-container">
    <!-- Nút X về trang chủ -->
    <a href="/" class="close-btn" title="Về trang chủ">&times;</a>

    <h1>Tạo tài khoản mới
      <i class="bi bi-person-plus" style="font-size:1.1rem; color:#0078d6; vertical-align:middle;"></i>
    </h1>

    {#if error??}
    <div class="alert-error">{error}</div>
    {/if}

    <form id="registerForm" method="post" action="/auth/register">
      <!-- fullName sẽ được ghép bởi JS từ họ + tên -->
      <input type="hidden" id="fullNameHidden" name="fullName" value="" />

      <!-- Họ và Tên -->
      <div class="form-row mb-3">
        <div>
          <label class="form-label" for="lastName">Họ <span class="required">*</span></label>
          <input type="text" class="form-control" id="lastName"
                 placeholder="Nguyễn" required maxlength="50" />
        </div>
        <div>
          <label class="form-label" for="firstName">Tên <span class="required">*</span></label>
          <input type="text" class="form-control" id="firstName"
                 placeholder="Văn An" required maxlength="50" />
        </div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label" for="regEmail">Email <span class="required">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="regEmail" name="email"
                 placeholder="example@email.com" required maxlength="150" />
        </div>
      </div>

      <!-- Số điện thoại -->
      <div class="mb-3">
        <label class="form-label" for="phoneNumber">Số Điện Thoại</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-telephone"></i></span>
          <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber"
                 placeholder="0901234567" maxlength="15" />
        </div>
      </div>

      <div class="divider-region">Bảo mật tài khoản</div>

      <!-- Mật khẩu -->
      <div class="mb-3">
        <label class="form-label" for="password">Mật Khẩu <span class="required">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password" id="password"
                 placeholder="Tối thiểu 6 ký tự" required minlength="6"
                 oninput="checkStrength(this.value)" />
          <button type="button" class="password-toggle btn"
                  onclick="togglePwd('password', this)">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-bar-fill" id="strengthFill"></div></div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <!-- Xác nhận mật khẩu -->
      <div class="mb-3">
        <label class="form-label" for="confirmPassword">
          Xác Nhận Mật Khẩu <span class="required">*</span>
        </label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="confirmPassword"
                 placeholder="Nhập lại mật khẩu" required />
          <button type="button" class="password-toggle btn"
                  onclick="togglePwd('confirmPassword', this)">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
        <div id="pwdMatchMsg" style="font-size:0.72rem; margin-top:0.25rem;"></div>
      </div>

      <!-- Điều khoản -->
      <div class="terms-section">
        <div class="form-check mb-2">
          <input class="form-check-input" type="checkbox" id="agreeTerms" required>
          <label class="form-check-label" for="agreeTerms">
            Tôi đồng ý với các điều khoản sau <span class="required">*</span><br>
            <a href="#">Điều khoản sử dụng Bán Xe Ô Tô ID</a>
          </label>
        </div>
        <p class="mb-0" style="margin-left:1.5rem; color:#666; font-size:0.78rem;">
          Xem thêm tại <a href="#">Chính sách quyền riêng tư Bán Xe Ô Tô ID</a>
        </p>
      </div>

      <div class="required-note">* Bắt buộc</div>

      <button type="submit" class="btn-primary-custom">
        <i class="bi bi-person-check-fill"></i>
        Tạo tài khoản mới
      </button>
    </form>

    <div class="login-link">
      Đã có Bán Xe Ô Tô ID? <a href="/auth/login">Đăng nhập</a>
    </div>
  </div>

  <div class="footer-links">
    Nhà cung cấp, Thông báo pháp lý, Thông tin về quyền riêng tư và cookie
  </div>

  <script>
    // Hiện / ẩn mật khẩu
    function togglePwd(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      } else {
        input.type = 'password';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      }
    }

    // Đo độ mạnh mật khẩu
    function checkStrength(val) {
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val))      score++;
      if (/[0-9]/.test(val))      score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: 20,  color: '#ef4444', label: 'Rất yếu'   },
        { pct: 40,  color: '#f97316', label: 'Yếu'        },
        { pct: 60,  color: '#eab308', label: 'Trung bình' },
        { pct: 80,  color: '#22c55e', label: 'Mạnh'       },
        { pct: 100, color: '#0078d6', label: 'Rất mạnh'   },
      ];
      const lvl = levels[Math.max(0, score - 1)];
      fill.style.width = lvl.pct + '%';
      fill.style.backgroundColor = lvl.color;
      text.textContent = val.length ? lvl.label : '';
      text.style.color  = lvl.color;
    }

    // Kiểm tra mật khẩu khớp
    document.getElementById('confirmPassword').addEventListener('input', function () {
      const pwd = document.getElementById('password').value;
      const msg = document.getElementById('pwdMatchMsg');
      if (!this.value) { msg.textContent = ''; return; }
      if (this.value === pwd) {
        msg.textContent = '✓ Mật khẩu khớp';
        msg.style.color = '#16a34a';
      } else {
        msg.textContent = '✗ Mật khẩu không khớp';
        msg.style.color = '#ef4444';
      }
    });

    // Submit: ghép fullName và kiểm tra mật khẩu
    document.getElementById('registerForm').addEventListener('submit', function (e) {
      const pwd     = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (pwd !== confirm) {
        e.preventDefault();
        alert('Mật khẩu xác nhận không khớp!');
        return;
      }
      const firstName = document.getElementById('firstName').value.trim();
      const lastName  = document.getElementById('lastName').value.trim();
      document.getElementById('fullNameHidden').value = lastName + ' ' + firstName;
    });
  </script>
</body>
</html>
