<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Bán Xe Ô Tô ID</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #0f0f0f;
      background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
      color: #333;
      position: relative;
    }
    
    /* Simulate a luxury star pattern in background */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 15 L43 35 L65 40 L43 45 L40 65 L37 45 L15 40 L37 35 Z' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E");
      z-index: -1;
    }

    .brand-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .brand-header .logo {
      width: 65px;
      height: 65px;
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      color: white;
    }
    .brand-header h2 {
      color: white;
      font-size: 0.95rem;
      font-weight: 500;
      margin: 0;
      letter-spacing: 0.5px;
    }

    .auth-container {
      background: white;
      width: 100%;
      max-width: 520px;
      padding: 2.5rem 3rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #f1f1f1;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #555;
      font-size: 1rem;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      line-height: 1;
    }
    .close-btn:hover {
      background: #e0e0e0;
      color: #000;
    }

    .auth-container h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 2rem;
      color: #000;
      font-family: 'Times New Roman', Times, serif;
    }

    .form-control {
      border: 1px solid #d4d4d4;
      border-radius: 0;
      padding: 0.8rem 1rem;
      font-size: 0.9rem;
      background-color: #f8f8f8;
      color: #333;
    }
    .form-control:focus {
      box-shadow: none;
      border-color: #0078d6;
      background-color: #fff;
    }
    .form-control::placeholder {
      color: #777;
    }

    .password-container {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #888;
      font-size: 1.1rem;
    }

    .btn-primary-custom {
      background-color: #0078d6;
      color: white;
      border: none;
      border-radius: 0;
      padding: 0.9rem;
      width: 100%;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background-color 0.2s;
      margin-top: 1rem;
    }
    .btn-primary-custom:hover {
      background-color: #005a9e;
    }

    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #333;
    }
    .register-link a {
      color: #0078d6;
      text-decoration: none;
    }
    .register-link a:hover {
      text-decoration: underline;
    }

    .footer-links {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
    }

    .alert-error {
      background: #fee2e2;
      border: 1px solid #ef4444;
      color: #b91c1c;
      padding: 0.75rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      text-align: center;
    }

    .divider-region {
      text-align: center;
      margin: 2rem 0 1.5rem;
      position: relative;
      font-size: 0.85rem;
      color: #000;
      font-weight: 500;
    }
    .divider-region::before, .divider-region::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #e0e0e0;
    }
    .divider-region::before { left: 0; }
    .divider-region::after { right: 0; }
  </style>
</head>
<body>

  <div class="brand-header">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 2v10l-8.5 5"></path>
        <path d="M12 12l8.5 5"></path>
      </svg>
    </div>
    <h2>Bán Xe Ô Tô ID</h2>
  </div>

  <div class="auth-container">
    <a href="/" class="close-btn" title="Về trang chủ">&times;</a>
    <h1>Đăng nhập <i class="bi bi-box-arrow-in-right" style="font-size: 1.1rem; color:#0078d6; vertical-align: middle;"></i></h1>

    {#if error??}
    <div class="alert-error">{error}</div>
    {/if}

    <form method="post" action="/auth/login">
      <div class="mb-3">
        <input type="text" class="form-control" name="email" placeholder="Tài khoản / Email *" required autofocus />
      </div>

      <div class="mb-3 password-container">
        <input type="password" class="form-control" name="password" id="password" placeholder="Mật khẩu *" required />
        <i class="bi bi-eye-slash password-toggle" onclick="togglePassword('password', this)"></i>
      </div>

      <button type="submit" class="btn-primary-custom">
        Đăng nhập
      </button>
    </form>
    
    <div class="divider-region">hoặc</div>

    <div class="register-link">
      Chưa có Bán Xe Ô Tô ID? <a href="/auth/register">Đăng ký ngay</a>
    </div>
  </div>

  <div class="footer-links">
    Nhà cung cấp, Thông báo pháp lý, Thông tin về quyền riêng tư và cookie
  </div>

  <script>
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
      } else {
        input.type = 'password';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
      }
    }
  </script>
</body>
</html>
