# Database Configuration
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=root
quarkus.datasource.password=123456
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/web_ban_xe?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false


# REST Configuration
# Không dùng quarkus.rest.path=/api vì sẽ ảnh hưởng cả Web UI routes
quarkus.rest.cors=true
quarkus.rest.cors.origins=*
quarkus.rest.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# Jackson Configuration
quarkus.jackson.write-dates-as-timestamps=false
quarkus.jackson.default-property-inclusion=non_null

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.acme".level=DEBUG

# Qute Template Configuration - tắt strict mode để cho phép biến optional
quarkus.qute.strict-rendering=false
